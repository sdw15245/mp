spring.application.name=backend

# DB
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Spotify OAuth2
spring.security.oauth2.client.registration.spotify.client-id=${SPOTIFY_CLIENT_ID}
spring.security.oauth2.client.registration.spotify.client-secret=${SPOTIFY_CLIENT_SECRET}
spring.security.oauth2.client.registration.spotify.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.spotify.redirect-uri=http://127.0.0.1:8080/login/oauth2/code/spotify
spring.security.oauth2.client.registration.spotify.scope[0]=user-read-private
spring.security.oauth2.client.registration.spotify.scope[1]=user-read-email
spring.security.oauth2.client.registration.spotify.scope[2]=user-top-read
spring.security.oauth2.client.registration.spotify.scope[3]=playlist-modify-public
spring.security.oauth2.client.registration.spotify.client-name=Spotify

spring.security.oauth2.client.provider.spotify.authorization-uri=https://accounts.spotify.com/authorize
spring.security.oauth2.client.provider.spotify.token-uri=https://accounts.spotify.com/api/token
spring.security.oauth2.client.provider.spotify.user-info-uri=https://api.spotify.com/v1/me
spring.security.oauth2.client.provider.spotify.user-name-attribute=id

# App
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
app.oauth2.success-redirect=http://localhost:5173/oauth/callback

# Last.fm
lastfm.api-key=${LASTFM_API_KEY}
lastfm.base-url=https://ws.audioscrobbler.com/2.0/

# Gemini (Google AI Studio)
gemini.api-key=${GOOGLE_API_KEY}
gemini.base-url=https://generativelanguage.googleapis.com/v1beta
gemini.model=gemini-flash-latest

# JWT
jwt.secret=${JWT_SECRET:change-me-change-me-change-me-change-me-123456}
jwt.expiration.access=${JWT_ACCESS_EXPIRATION:1800000}
jwt.expiration.refresh=${JWT_REFRESH_EXPIRATION:604800000}

